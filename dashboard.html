<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            font-family: Arial;
            background:#f4f6f9;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#1e3c72;
            position:fixed;
            padding-top:20px;
        }

        .sidebar h3{
            color:white;
            text-align:center;
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            color:white;
            padding:15px 20px;
            text-decoration:none;
        }

        .sidebar a:hover{
            background:#16325c;
        }

        .content{
            margin-left:250px;
            padding:30px;
        }

        .card-box{
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
            text-align:center;
        }

    </style>

</head>
<body>

    <div class="sidebar">

        <h3>Faculty Panel</h3>

        <a href="/dashboard">Dashboard</a>
<a href="/apply_leave">Apply Leave</a>
<a href="/my_timetable">My Timetable</a>
<a href="/adjustment_status">Adjustment Status</a>
<a href="/logout">Logout</a>
    </div>

    <div class="content">

        <h2>Welcome {{ session['name'] }}</h2>

        <div class="row mt-4">

            <div class="col-md-4">
                <div class="card-box">
                    <h4>Total Lectures</h4>
                    <h2>24</h2>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-box">
                    <h4>Pending Adjustments</h4>
                    <h2>3</h2>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-box">
                    <h4>Approved Leaves</h4>
                    <h2>5</h2>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
