<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Leave</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial;
        }

        .container-box{
            width:500px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        .title{
            text-align:center;
            margin-bottom:30px;
            color:#1e3c72;
        }

        .btn-custom{
            background:#1e3c72;
            color:white;
            width:100%;
        }

        .btn-custom:hover{
            background:#16325c;
            color:white;
        }

    </style>

</head>
<body>

    <div class="container-box">

        <h2 class="title">Apply Leave</h2>

        <form method="POST" action="/submit_leave">

    <div class="mb-3">
        <label>Leave Date</label>
        <input type="date" name="leave_date" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Reason</label>
        <textarea name="reason" class="form-control" rows="4" required></textarea>
    </div>

    <button type="submit" class="btn btn-custom">
        Submit Leave
    </button>

</form>

    </div>

</body>
</html>
