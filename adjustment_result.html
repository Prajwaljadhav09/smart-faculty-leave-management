<!DOCTYPE html>
<html>
<head>
    <title>Suggested Adjustments</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Faculty Load Adjustment Suggestions</h2>

    <h4>Faculty : {{ faculty_name }}</h4>

    <h4>Day : {{ day_name }}</h4>

    <table class="table table-bordered mt-4">

        <tr>
            <th>Time Slot</th>
            <th>Subject</th>
            <th>Available Faculty</th>
        </tr>

        {% for row in suggestions %}

        <tr>
            <td>{{ row['time_slot'] }}</td>
            <td>{{ row['subject'] }}</td>
            <td>{{ row['available_faculty'] }}</td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
