<!DOCTYPE html>
<html>
<head>
    <title>My Timetable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>My Timetable</h2>

    <table class="table table-bordered">

        <tr>
            <th>Day</th>
            <th>Time Slot</th>
            <th>Subject</th>
            <th>Class</th>
            <th>Type</th>
        </tr>

        {% for row in timetable %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
